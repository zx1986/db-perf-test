apiVersion: v1
data:
  sysbench-cleanup.sh: |
    #!/bin/bash
    set -e

    # Sysbench cleanup script - generated from Helm values

    echo "=== Sysbench Cleanup ==="
    echo "Dropping benchmark tables..."
    echo ""

    exec sysbench oltp_read_write \
      --db-driver=pgsql \
      --pgsql-host=yb-tserver-service \
      --pgsql-port=5433 \
      --pgsql-user=yugabyte \
      --pgsql-password=yugabyte \
      --pgsql-db=yugabyte \
      --tables=10 \
      --table_size=100000 \
      cleanup
  sysbench-prepare.sh: |
    #!/bin/bash
    set -e

    # Sysbench prepare script - generated from Helm values
    # Parameters follow YugabyteDB docs: https://docs.yugabyte.com/stable/benchmark/sysbench-ysql/

    echo "=== Sysbench Prepare ==="
    echo "Workload: oltp_read_write"
    echo "Tables: 10 x 100000 rows"
    echo ""

    exec sysbench oltp_read_write \
      --db-driver=pgsql \
      --pgsql-host=yb-tserver-service \
      --pgsql-port=5433 \
      --pgsql-user=yugabyte \
      --pgsql-password=yugabyte \
      --pgsql-db=yugabyte \
      --tables=10 \
      --table_size=100000 \
      --range_key_partitioning=false \
      --serial_cache_size=1000 \
      --create_secondary=true \
      prepare
  sysbench-run.sh: |
    #!/bin/bash
    set -e

    # Sysbench run script - generated from Helm values
    # Parameters follow YugabyteDB docs: https://docs.yugabyte.com/stable/benchmark/sysbench-ysql/

    echo "=== Sysbench Benchmark ==="
    echo "Workload: oltp_read_write"
    echo "Threads: 24"
    echo "Duration: 120s (warmup: 30s)"
    echo ""

    # CRITICAL: range_selects=false prevents 100x slowdown from cross-tablet scans
    exec sysbench oltp_read_write \
      --db-driver=pgsql \
      --pgsql-host=yb-tserver-service \
      --pgsql-port=5433 \
      --pgsql-user=yugabyte \
      --pgsql-password=yugabyte \
      --pgsql-db=yugabyte \
      --tables=10 \
      --table_size=100000 \
      --range_key_partitioning=false \
      --serial_cache_size=1000 \
      --create_secondary=true \
      --range_selects=false \
      --point_selects=2 \
      --index_updates=20 \
      --non_index_updates=20 \
      --num_rows_in_insert=10 \
      --thread-init-timeout=90 \
      --threads=24 \
      --time=120 \
      --warmup-time=30 \
      --report-interval=10 \
      --verbosity=3 \
      run
