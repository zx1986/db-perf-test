apiVersion: apps/v1
kind: Deployment
metadata:
  name: cdc-kafka-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cdc-kafka-connect
  template:
    metadata:
      labels:
        app: cdc-kafka-connect
    spec:
      nodeSelector:
        role: master
      containers:
      - name: kafka-connect
        image: confluentinc/cp-kafka-connect:7.8.0
        command: ["/bin/bash", "-c"]
        args:
        - |
          echo "Installing Kafka Connect plugins..."
          confluent-hub install --no-prompt debezium/debezium-connector-mysql:latest
          confluent-hub install --no-prompt confluentinc/kafka-connect-jdbc:latest
          echo "Downloading PostgreSQL JDBC driver..."
          curl -sfL -o /usr/share/confluent-hub-components/confluentinc-kafka-connect-jdbc/lib/postgresql-42.7.3.jar \
            https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.3/postgresql-42.7.3.jar
          echo "Starting Kafka Connect..."
          /etc/confluent/docker/run
        env:
        - name: CONNECT_BOOTSTRAP_SERVERS
          value: "cdc-kafka:9092"
        - name: CONNECT_GROUP_ID
          value: "cdc-connect"
        - name: CONNECT_CONFIG_STORAGE_TOPIC
          value: "_connect-configs"
        - name: CONNECT_OFFSET_STORAGE_TOPIC
          value: "_connect-offsets"
        - name: CONNECT_STATUS_STORAGE_TOPIC
          value: "_connect-status"
        - name: CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_STATUS_STORAGE_REPLICATION_FACTOR
          value: "1"
        - name: CONNECT_KEY_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: CONNECT_VALUE_CONVERTER
          value: "org.apache.kafka.connect.json.JsonConverter"
        - name: CONNECT_REST_PORT
          value: "8083"
        - name: CONNECT_REST_ADVERTISED_HOST_NAME
          value: "cdc-kafka-connect"
        - name: CONNECT_PLUGIN_PATH
          value: "/usr/share/java,/usr/share/confluent-hub-components"
        ports:
        - containerPort: 8083
        resources:
          requests:
            cpu: "10m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "1536Mi"
        readinessProbe:
          httpGet:
            path: /connectors
            port: 8083
          initialDelaySeconds: 120
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cdc-kafka-connect
spec:
  selector:
    app: cdc-kafka-connect
  ports:
  - port: 8083
    targetPort: 8083
